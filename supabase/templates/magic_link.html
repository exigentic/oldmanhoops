<!doctype html>
<html lang="en">
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1f2937; max-width: 480px; margin: 0 auto; padding: 24px;">
    <h2 style="color: #4338ca; margin-top: 0;">Sign in to Old Man Hoops</h2>
    <p>Click the button below to sign in, or enter the 6-digit code on the sign-in page.</p>
    <p>
      <a
        href="{{ .ConfirmationURL }}"
        style="display: inline-block; background: #4f46e5; color: #ffffff; padding: 10px 18px; border-radius: 6px; text-decoration: none; font-weight: 600;"
      >Sign in</a>
    </p>
    <p style="margin-top: 24px;">
      Your sign-in code:
      <strong style="font-size: 20px; letter-spacing: 2px;">{{ .Token }}</strong>
    </p>
    <p style="color: #6b7280; font-size: 13px;">
      This link and code expire in 1 hour. If you didn't request this, you can ignore this email.
    </p>
  </body>
</html>
